<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Enrollment Form</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Student Enrollment Form</h1>
      <p class="subtitle">Database: SCHOOL-DB | Table: STUDENT-TABLE</p>

      <form id="enrollmentForm" novalidate>
        <div class="grid">
          <label for="connectionToken">JPDB Token</label>
          <input id="connectionToken" name="connectionToken" type="password" placeholder="Paste your JPDB connection token" autocomplete="off" />

          <label for="rollNo">Roll No (Primary Key)</label>
          <input id="rollNo" name="rollNo" type="text" maxlength="20" autocomplete="off" />

          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" maxlength="80" autocomplete="off" />

          <label for="studentClass">Class</label>
          <input id="studentClass" name="studentClass" type="text" maxlength="20" autocomplete="off" />

          <label for="birthDate">Birth Date</label>
          <input id="birthDate" name="birthDate" type="date" />

          <label for="address">Address</label>
          <input id="address" name="address" type="text" maxlength="150" autocomplete="off" />

          <label for="enrollmentDate">Enrollment Date</label>
          <input id="enrollmentDate" name="enrollmentDate" type="date" />
        </div>

        <div class="actions">
          <button id="saveBtn" type="button">Save</button>
          <button id="updateBtn" type="button">Update</button>
          <button id="resetBtn" type="button">Reset</button>
        </div>

        <p id="message" class="message" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
  <script src="app.js"></script>
</body>
</html>
